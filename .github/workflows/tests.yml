name: Pruebas Unitarias

on:
  push:
    branches: [ main ]

jobs:

  tests:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt

    - name: Ejecutar pruebas
      run: |
        pytest --cov=.